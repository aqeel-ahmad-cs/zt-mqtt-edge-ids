# Access control list for the lab Mosquitto broker.
# Format follows the standard mosquitto acl_file syntax.
# Each simulated device gets the narrowest possible topic scope -
# a compromised sensor should not be able to read/write topics
# outside its own namespace, which also gives the anomaly engine
# a clean signal when a client tries to step outside its lane.

user temp-sensor-01
topic write telemetry/temp-sensor-01
topic read cmd/temp-sensor-01

user humidity-sensor-01
topic write telemetry/humidity-sensor-01
topic read cmd/humidity-sensor-01

user smart-plug-01
topic write telemetry/smart-plug-01
topic read cmd/smart-plug-01

user gateway-admin
topic readwrite #

# Anything not matched above falls through to broker default deny,
# since allow_anonymous is set to false in mosquitto.conf.
